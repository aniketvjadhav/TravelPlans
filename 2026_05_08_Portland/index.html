<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --forest:      #1c3a28;
    --moss:        #2e5c3e;
    --sage:        #5a8a6a;
    --cream:       #f5f2ec;
    --mist:        #e8ede9;
    --ink:         #1a1e1b;
    --slate:       #4a5450;
    --amber:       #b86a1a;
    --amber-light: #f5e6d3;
    --water:       #3a6b8a;
    --water-light: #ddeaf2;
    --rule:        rgba(30,58,40,0.15);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── LOADING ── */
  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-size: 13px;
    color: var(--sage);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── NAV ── */
  .day-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--forest);
    display: flex;
    border-bottom: 2px solid var(--moss);
    margin-bottom: 32px;
  }
  .day-nav a {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 4px;
    text-decoration: none;
    text-align: center;
    color: rgba(255,255,255,0.5);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s;
  }
  .day-nav a:hover, .day-nav a.active { color: #fff; border-bottom-color: #8ecfa0; }
  .nav-date { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; line-height: 1.3; }
  .nav-loc  { font-size: 11px; letter-spacing: 0.03em; opacity: 0.75; line-height: 1.3; margin-top: 1px; }
  .day-nav a.active .nav-loc { opacity: 1; }

  /* ── DAY SECTION ── */
  .day-section { padding: 0 40px 56px; max-width: 860px; margin: 0 auto; }

  /* ── HEADER ── */
  .header { border-bottom: 1.5px solid var(--forest); padding-bottom: 28px; margin-bottom: 36px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
  .eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage); margin-bottom: 8px; }
  h1 { font-size: 36px; font-weight: 500; color: var(--forest); line-height: 1.15; }
  h1 em { font-style: italic; font-weight: 300; }
  .header-meta { text-align: right; flex-shrink: 0; }
  .date-block { font-size: 13px; color: var(--slate); line-height: 1.8; }
  .sun-row { display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 0.5px solid var(--rule); flex-wrap: wrap; }
  .sun-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--slate); }
  .sun-icon { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .sun-icon.rise { background: #f5b944; }
  .sun-icon.set  { background: #e0753a; }
  .sun-item strong { color: var(--ink); font-weight: 500; }

  /* ── SECTION LABEL ── */
  .section-label { font-size: 9.5px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--sage); margin-bottom: 12px; }

  /* ── WEATHER ── */
  .weather-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 36px; scrollbar-width: none; }
  .weather-scroll::-webkit-scrollbar { display: none; }
  .weather-strip { display: grid; grid-template-columns: repeat(8, 1fr); background: var(--water-light); border-radius: 10px; overflow: hidden; border: 0.5px solid rgba(58,107,138,0.2); min-width: 560px; }
  .weather-cell { padding: 10px 6px; text-align: center; border-right: 0.5px solid rgba(58,107,138,0.12); }
  .weather-cell:last-child { border-right: none; }
  .w-time { font-size: 10px; font-weight: 500; color: var(--water); margin-bottom: 4px; }
  .w-icon { font-size: 16px; margin: 2px 0; }
  .w-temp { font-size: 12px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
  .w-wind { font-size: 9px; color: var(--slate); }

  /* ── TIMELINE ── */
  .timeline { margin-bottom: 36px; }
  .tl-item { display: grid; grid-template-columns: 88px 1px 1fr; gap: 0 16px; }
  .tl-item:last-child .tl-line-seg { display: none; }
  .tl-time { padding: 16px 0 0; text-align: right; font-size: 11.5px; font-weight: 500; color: var(--slate); white-space: pre-line; line-height: 1.3; }
  .tl-spine { display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--forest); margin-top: 19px; flex-shrink: 0; position: relative; z-index: 1; }
  .tl-dot.accent { background: var(--amber); }
  .tl-dot.water  { background: var(--water); }
  .tl-line-seg { flex: 1; width: 1px; background: var(--rule); min-height: 20px; }
  .tl-body { padding: 12px 0 16px; border-bottom: 0.5px solid var(--rule); }
  .tl-item:last-child .tl-body { border-bottom: none; }
  .tl-title { font-size: 15px; font-weight: 500; color: var(--forest); margin-bottom: 3px; }
  .tl-title.amber-title { color: var(--amber); }
  .tl-title.water-title { color: var(--water); }
  a.maps-loc { color: inherit; text-decoration: none; }
  a.maps-loc:hover .tl-title { text-decoration: underline; text-decoration-color: var(--sage); }
  .tl-note { font-size: 12.5px; color: var(--slate); line-height: 1.55; }

  /* ── TAGS ── */
  .tag { display: inline-block; font-size: 9.5px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; margin-right: 6px; margin-top: 5px; }
  .tag-waterfall { background: var(--water-light); color: var(--water); }
  .tag-preferred  { background: var(--amber-light); color: var(--amber); }
  .tag-backup     { background: var(--mist); color: var(--slate); }

  /* ── FOOD ── */
  .food-sublabel { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .food-sublabel.amber { color: var(--amber); }
  .food-sublabel.slate { color: var(--slate); }
  .food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .food-card { background: white; border: 0.5px solid var(--rule); border-radius: 10px; padding: 14px 16px; }
  .food-card.highlight { background: var(--amber-light); border-color: rgba(184,106,26,0.25); }
  .food-name { font-size: 13.5px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
  .food-location { font-size: 11px; color: var(--slate); margin-bottom: 4px; }
  .food-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .stars { display: flex; gap: 1px; }
  .star { width: 9px; height: 9px; background: var(--amber); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }
  .star.half { opacity: 0.35; }
  .rating-num { font-size: 11px; font-weight: 500; color: var(--amber); }
  .food-tag { font-size: 10px; color: var(--slate); background: var(--mist); padding: 1px 7px; border-radius: 20px; }
  .maps-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 500; color: var(--water); margin-bottom: 4px; text-decoration: none; letter-spacing: 0.02em; }
  .maps-badge:hover { text-decoration: underline; }

  /* ── FOOD FEATURED (Salty's) ── */
  .food-featured-wrap { margin-bottom: 36px; }
  .food-featured { background: white; border: 0.5px solid rgba(184,106,26,0.3); border-radius: 10px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .food-featured-name { font-size: 15px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
  .food-featured-addr { font-size: 11px; color: var(--slate); margin-bottom: 8px; }
  .food-featured-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .food-featured-tag { font-size: 10px; color: var(--slate); background: var(--mist); padding: 1px 7px; border-radius: 20px; }
  .food-featured-tag.amber { background: var(--amber-light); color: var(--amber); }
  .food-featured-time { text-align: right; flex-shrink: 0; }
  .food-featured-clock { font-size: 20px; font-weight: 500; color: var(--amber); }
  .food-featured-dur   { font-size: 11px; color: var(--slate); }

  /* ── DECISIONS ── */
  .decision-grid { display: grid; gap: 12px; margin-bottom: 40px; }
  .decision-card { border-radius: 10px; padding: 16px 18px; border: 1px solid transparent; text-decoration: none; display: block; color: inherit; }
  .decision-card.preferred { background: #f0f6f2; border-color: var(--moss); }
  .decision-card.backup    { background: white; border-color: var(--rule); }
  .decision-badge { font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; display: inline-block; }
  .preferred .decision-badge { background: var(--forest); color: #d8ead0; }
  .backup    .decision-badge { background: var(--mist); color: var(--slate); }
  .decision-name { font-size: 16px; font-weight: 500; color: var(--forest); margin-bottom: 4px; }
  .backup .decision-name { color: var(--ink); }
  .decision-desc { font-size: 12px; color: var(--slate); line-height: 1.5; }

  /* ── FOOTER ── */
  .footer { border-top: 1.5px solid var(--forest); padding-top: 20px; display: flex; justify-content: space-between; align-items: center; opacity: 0.55; margin-top: 8px; }
  .footer-left  { font-style: italic; font-size: 12.5px; color: var(--forest); }
  .footer-right { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--slate); }

  /* ── FAREWELL ── */
  .farewell { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 40px; }
  .farewell-emoji   { font-size: 72px; margin-bottom: 32px; }
  .farewell-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage); margin-bottom: 16px; }
  .farewell-title   { font-size: 42px; font-weight: 500; color: var(--forest); line-height: 1.2; margin-bottom: 20px; }
  .farewell-msg     { font-size: 16px; color: var(--slate); max-width: 400px; line-height: 1.8; margin-bottom: 48px; }
  .farewell-rule    { width: 40px; height: 1.5px; background: var(--forest); margin-bottom: 48px; }
  .farewell-tagline { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sage); }

  /* ── HOTEL CARD ── */
  .hotel-card {
    background: white;
    border: 1px solid var(--rule);
    border-left: 3px solid var(--forest);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px 24px;
    align-items: start;
  }
  .hotel-card-left {}
  .hotel-card-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--forest);
    color: #d8ead0;
    padding: 2px 9px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .hotel-card-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 3px;
  }
  .hotel-card-address {
    font-size: 11.5px;
    color: var(--slate);
    margin-bottom: 8px;
  }
  .hotel-card-fields {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 20px;
    margin-top: 6px;
  }
  .hotel-field {}
  .hotel-field-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1px;
  }
  .hotel-field-value {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink);
  }
  .hotel-field-value.highlight {
    color: var(--forest);
    font-size: 14px;
  }
  .hotel-card-right {
    text-align: right;
  }
  .hotel-conf-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 4px;
  }
  .hotel-conf-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--forest);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .hotel-cancel {
    font-size: 10.5px;
    color: var(--slate);
    margin-top: 8px;
    line-height: 1.5;
    max-width: 180px;
    text-align: right;
  }

  /* ── MOBILE ── */
  @media (max-width: 620px) {
    .day-section { padding: 0 18px 56px; }
    .header-top { flex-direction: column; gap: 10px; }
    .header-meta { text-align: left; }
    h1 { font-size: 26px; }
    .sun-item:last-child { width: 100%; margin-left: 0 !important; }
    .tl-item { grid-template-columns: 72px 1px 1fr; gap: 0 12px; }
    .tl-time { font-size: 10.5px; }
    .food-grid { grid-template-columns: 1fr; }
    .decision-grid { grid-template-columns: 1fr !important; }
    .food-featured { flex-direction: column; gap: 8px; }
    .food-featured-time { text-align: left; }
    .farewell { padding: 48px 24px; min-height: 60vh; }
    .farewell-title { font-size: 32px; }
    .hotel-card { grid-template-columns: 1fr; }
    .hotel-card-right { text-align: left; }
    .hotel-cancel { text-align: left; max-width: 100%; }
  }

  @media (min-width: 621px) {
    body { padding-bottom: 96px; }
  }
</style>
</head>
<body>

<div id="loading">Loading itinerary…</div>
<nav class="day-nav" id="day-nav" style="display:none" aria-label="Day navigation"></nav>
<div id="content"></div>

<script>
// ── HELPERS ────────────────────────────────────────────────────────────────

const PIN_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

function mapsBadge(url) {
  return `<a class="maps-badge" href="${url}" target="_blank" rel="noopener">${PIN_SVG} Open in Maps</a>`;
}

function stars(rating) {
  const full  = Math.floor(rating);
  const half  = (rating % 1) >= 0.3 && (rating % 1) < 0.9 ? 1 : 0;
  const empty = 5 - full - half;
  return `<div class="stars">
    ${'<div class="star"></div>'.repeat(full)}
    ${half ? '<div class="star half"></div>' : ''}
    ${'<div class="star" style="opacity:0.12"></div>'.repeat(empty)}
  </div>`;
}

function renderTag(t) {
  const cls = { waterfall:'tag-waterfall', preferred:'tag-preferred', backup:'tag-backup' }[t.type] || 'tag-backup';
  return `<span class="tag ${cls}">${t.label}</span>`;
}

// ── SECTION RENDERERS ──────────────────────────────────────────────────────

function renderTimeline(section) {
  const items = section.items.map((item, i) => {
    const isLast   = i === section.items.length - 1;
    const dotCls   = item.dot === 'water' ? 'water' : item.dot === 'accent' ? 'accent' : '';
    const titleCls = item.title_color === 'water' ? 'water-title' : item.title_color === 'amber' ? 'amber-title' : '';
    const titleEl  = item.maps_url
      ? `<a href="${item.maps_url}" target="_blank" rel="noopener" class="maps-loc"><div class="tl-title ${titleCls}">${item.title} ↗</div></a>`
      : `<div class="tl-title ${titleCls}">${item.title}</div>`;
    const tagsHtml = (item.tags || []).map(renderTag).join('');
    return `
    <div class="tl-item">
      <div class="tl-time">${item.time}</div>
      <div class="tl-spine">
        <div class="tl-dot ${dotCls}"></div>
        ${isLast ? '' : '<div class="tl-line-seg"></div>'}
      </div>
      <div class="tl-body">
        ${titleEl}
        ${tagsHtml}
        <div class="tl-note" style="margin-top:${tagsHtml ? '6px' : '2px'}">${item.note}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="section-label">${section.label}</div>
  <div class="timeline">${items}</div>`;
}

function renderFoodCard(item) {
  return `
  <div class="food-card${item.highlight ? ' highlight' : ''}">
    <div class="food-name">${item.name}</div>
    ${item.maps_url ? mapsBadge(item.maps_url) : ''}
    <div class="food-location">${item.address}</div>
    <div class="food-meta">
      ${stars(item.rating)}
      <span class="rating-num">${item.rating.toFixed(1)}</span>
      <span class="food-tag">${item.cuisine}</span>
    </div>
  </div>`;
}

function renderFood(section) {
  const subsHtml = section.subsections.map(sub => {
    const sublabelHtml = sub.sublabel
      ? `<div class="food-sublabel ${sub.sublabel_color || ''}">${sub.sublabel}</div>`
      : '';
    return sublabelHtml + `<div class="food-grid">${sub.items.map(renderFoodCard).join('')}</div>`;
  }).join('');
  return `<div class="section-label">${section.label}</div>${subsHtml}`;
}

function renderFoodFeatured(section) {
  const item = section.item;
  const tagsHtml = item.tags.map((t, i) =>
    `<span class="food-featured-tag${i === 0 ? ' amber' : ''}">${t}</span>`
  ).join('');
  return `
  <div class="section-label">${section.label}</div>
  <div class="food-featured-wrap">
    <div class="food-featured">
      <div>
        <div class="food-featured-name">${item.name}</div>
        ${item.maps_url ? mapsBadge(item.maps_url) : ''}
        <div class="food-featured-addr">${item.address} · ${item.note}</div>
        <div class="food-featured-tags">${tagsHtml}</div>
      </div>
      <div class="food-featured-time">
        <div class="food-featured-clock">${item.time}</div>
        <div class="food-featured-dur">${item.duration}</div>
      </div>
    </div>
  </div>`;
}

function renderDecision(section) {
  const cols  = section.columns || 2;
  const items = section.items.map(item => {
    const el   = item.maps_url ? 'a' : 'div';
    const href = item.maps_url ? `href="${item.maps_url}" target="_blank" rel="noopener"` : '';
    return `<${el} class="decision-card ${item.type}" ${href}>
      <div class="decision-badge">${item.badge}</div>
      <div class="decision-name">${item.name}${item.maps_url ? ' ↗' : ''}</div>
      <div class="decision-desc">${item.desc}</div>
    </${el}>`;
  }).join('');
  return `<div class="section-label">${section.label}</div>
  <div class="decision-grid" style="grid-template-columns:repeat(${cols},1fr)">${items}</div>`;
}

function renderSection(section) {
  if (section.type === 'timeline')      return renderTimeline(section);
  if (section.type === 'food')          return renderFood(section);
  if (section.type === 'food_featured') return renderFoodFeatured(section);
  if (section.type === 'decision')      return renderDecision(section);
  return '';
}

// ── HOTEL CARD ────────────────────────────────────────────────────────────

function renderHotelCard(hotelCard, hotels) {
  const h = hotels[hotelCard.hotel_index];
  const isCheckIn      = hotelCard.type === 'check_in';
  const badgeLabel     = isCheckIn ? '🏨 Check-in' : '🏨 Check-out';
  const highlightLabel = isCheckIn ? 'Check-in'  : 'Check-out';
  const highlightTime  = isCheckIn ? h.check_in_time  : h.check_out_time;
  const otherLabel     = isCheckIn ? 'Check-out' : 'Check-in';
  const otherTime      = isCheckIn ? h.check_out_time : h.check_in_time;
  const addressEl      = h.maps_url
    ? `<a href="${h.maps_url}" target="_blank" rel="noopener" style="color:var(--water);text-decoration:none">${h.address} ↗</a>`
    : h.address;
  return `
  <div class="hotel-card">
    <div class="hotel-card-left">
      <div class="hotel-card-badge">${badgeLabel}</div>
      <div class="hotel-card-name">${h.name}</div>
      <div class="hotel-card-address">${addressEl}</div>
      <div class="hotel-card-fields">
        <div class="hotel-field">
          <div class="hotel-field-label">${highlightLabel}</div>
          <div class="hotel-field-value highlight">${highlightTime}</div>
        </div>
        <div class="hotel-field">
          <div class="hotel-field-label">${otherLabel}</div>
          <div class="hotel-field-value">${otherTime}</div>
        </div>
        <div class="hotel-field">
          <div class="hotel-field-label">Dates</div>
          <div class="hotel-field-value">${h.check_in_date} – ${h.check_out_date}</div>
        </div>
      </div>
    </div>
    <div class="hotel-card-right">
      <div class="hotel-conf-label">Confirmation</div>
      <div class="hotel-conf-value">${h.confirmation}</div>
      <div class="hotel-cancel">${h.cancellation_policy}</div>
    </div>
  </div>`;
}

// ── DAY RENDERERS ──────────────────────────────────────────────────────────

function renderWeather(weather) {
  if (!weather || !weather.length) return '';
  const cells = weather.map(w => `
    <div class="weather-cell">
      <div class="w-time">${w.time}</div>
      <div class="w-icon">${w.icon}</div>
      <div class="w-temp">${w.temp}</div>
      <div class="w-wind">${w.wind}</div>
    </div>`).join('');
  return `<div class="section-label">Hourly Weather</div>
  <div class="weather-scroll"><div class="weather-strip">${cells}</div></div>`;
}

function renderHeader(h) {
  const route  = h.route.map(r => `${r}<br>`).join('');
  const sunRow = (h.sunrise || h.sunset)
    ? `<div class="sun-row">
        ${h.sunrise ? `<div class="sun-item"><div class="sun-icon rise"></div>Sunrise <strong>${h.sunrise}</strong></div>` : ''}
        ${h.sunset  ? `<div class="sun-item"><div class="sun-icon set"></div>Sunset <strong>${h.sunset}</strong></div>` : ''}
        ${h.weather_summary ? `<div class="sun-item" style="margin-left:auto;font-size:11px">${h.weather_summary}</div>` : ''}
       </div>`
    : h.weather_summary
      ? `<div class="sun-row"><div class="sun-item" style="font-size:12px;color:var(--slate)">${h.weather_summary}</div></div>`
      : '';
  return `<header class="header">
    <div class="header-top">
      <div>
        <p class="eyebrow">${h.eyebrow}</p>
        <h1>${h.title}<br><em>${h.subtitle}</em></h1>
      </div>
      <div class="header-meta"><div class="date-block">${route}</div></div>
    </div>
    ${sunRow}
  </header>`;
}

function renderDay(day) {
  const hotelHtml   = day.hotel_card ? renderHotelCard(day.hotel_card, window._hotels) : '';
  const sectionsHtml = day.sections.map(renderSection).join('');
  return `
  <section class="day-section" id="${day.id}">
    ${renderHeader(day.header)}
    ${renderWeather(day.weather)}
    ${hotelHtml}
    ${sectionsHtml}
    <footer class="footer">
      <div class="footer-left">${day.footer.left}</div>
      <div class="footer-right">${day.footer.right}</div>
    </footer>
  </section>`;
}

function renderFarewell(day) {
  return `
  <section class="day-section" id="${day.id}">
    <div class="farewell">
      <div class="farewell-emoji">${day.emoji}</div>
      <p class="farewell-eyebrow">${day.eyebrow}</p>
      <h1 class="farewell-title">${day.title}</h1>
      <p class="farewell-msg">${day.message}</p>
      <div class="farewell-rule"></div>
      <p class="farewell-tagline">${day.tagline}</p>
    </div>
    <footer class="footer">
      <div class="footer-left">${day.footer.left}</div>
      <div class="footer-right">${day.footer.right}</div>
    </footer>
  </section>`;
}

// ── MAIN ──────────────────────────────────────────────────────────────────

fetch('./data.json')
  .then(r => { if (!r.ok) throw new Error('Failed to load data.json'); return r.json(); })
  .then(data => {
    document.title = data.meta.trip_name + ' · ' + data.meta.dates;
    window._hotels = data.hotels || [];

    const nav     = document.getElementById('day-nav');
    const content = document.getElementById('content');

    function showDay(index) {
      const day = data.days[index];
      content.innerHTML = day.type === 'farewell' ? renderFarewell(day) : renderDay(day);
      window.scrollTo(0, 0);
      nav.querySelectorAll('a').forEach((a, i) => a.classList.toggle('active', i === index));
    }

    // Nav
    nav.innerHTML = data.days.map((d, i) =>
      `<a href="#" data-index="${i}"><span class="nav-date">${d.nav.date}</span><span class="nav-loc">${d.nav.loc}</span></a>`
    ).join('');
    nav.style.display = 'flex';
    nav.addEventListener('click', e => {
      const a = e.target.closest('a[data-index]');
      if (!a) return;
      e.preventDefault();
      showDay(+a.dataset.index);
    });

    document.getElementById('loading').remove();
    showDay(0);
  })
  .catch(err => {
    document.getElementById('loading').textContent = '⚠️ ' + err.message;
  });
</script>
</body>
</html>
